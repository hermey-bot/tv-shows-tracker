<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Shows Tracker — Episode Release Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg-card: #12121a;
    --bg-card-hover: #181824;
    --border: #1e1e30;
    --border-subtle: #161622;
    --text: #e8e8f0;
    --text-muted: #8888a0;
    --text-dim: #555570;
    --accent-1: #7c3aed;
    --accent-2: #2563eb;
    --accent-3: #06b6d4;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --gradient-header: linear-gradient(135deg, #1a0533 0%, #0a1628 50%, #051520 100%);
    --gradient-show-1: linear-gradient(135deg, #7c3aed22, #2563eb22);
    --gradient-show-2: linear-gradient(135deg, #06b6d422, #22c55e22);
    --gradient-show-3: linear-gradient(135deg, #f59e0b22, #ef444422);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    background: var(--gradient-header);
    border-bottom: 1px solid var(--border);
    padding: 32px 24px 24px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 600px 200px at 50% -80px, #7c3aed33, transparent);
    pointer-events: none;
  }
  .header-content {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #c084fc, #60a5fa, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 400;
  }
  .header-time {
    text-align: right;
  }
  .header-time .time {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .header-time .tz {
    font-size: 12px;
    color: var(--text-muted);
  }
  .header-time .date {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── Season countdown row ── */
  .season-row {
    max-width: 1200px;
    margin: 20px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .season-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .season-chip .num { font-weight: 700; color: var(--text); }
  .season-chip .label { font-weight: 500; }

  /* ── Filter bar ── */
  .filter-bar {
    max-width: 1200px;
    margin: 20px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent-1); color: var(--text); }
  .filter-btn.active { background: var(--accent-1); border-color: var(--accent-1); color: #fff; }

  /* ── Main ── */
  .main {
    max-width: 1200px;
    margin: 24px auto;
    padding: 0 24px 48px;
  }

  /* ── Spotlight ── */
  .spotlight { margin-bottom: 32px; display: none; }
  .spotlight.has-spotlight { display: block; }
  .spotlight-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .spotlight-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }
  .spotlight-card {
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .spotlight-card .show-badge {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
    color: #000;
  }
  .spotlight-card .ep-info { flex: 1; min-width: 200px; }
  .spotlight-card .ep-title { font-size: 18px; font-weight: 700; }
  .spotlight-card .ep-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .spotlight-card .ep-right { text-align: right; flex-shrink: 0; }
  .spotlight-card .ep-time { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .spotlight-card .countdown { font-size: 13px; font-weight: 500; margin-top: 4px; font-variant-numeric: tabular-nums; }

  /* ── Show Grid ── */
  .show-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 20px;
  }

  /* ── Show Card ── */
  .show-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .show-card:hover {
    border-color: var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .show-card.season-done {
    opacity: 0.5;
  }
  .show-card.season-done .show-card-header {
    opacity: 0.7;
  }

  .show-card-header {
    padding: 20px 20px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .show-card-header .show-info { flex: 1; }
  .show-card-header .show-name {
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .show-card-header .show-meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .show-card-header .show-status {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }
  .show-status.running { background: #22c55e22; color: var(--green); }
  .show-status.done { background: #55557022; color: var(--text-dim); }

  /* ── Countdown in header ── */
  .countdown-row {
    padding: 0 20px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .countdown-row .next-label {
    color: var(--text-muted);
    font-weight: 500;
  }
  .countdown-row .next-ep {
    color: var(--text);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .countdown-row .next-ep .finale-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--amber);
    color: #000;
    margin-left: 6px;
    vertical-align: middle;
  }
  .countdown-row .timer {
    margin-left: auto;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .countdown-row .timer.green { color: var(--green); }
  .countdown-row .timer.amber { color: var(--amber); }
  .countdown-row .timer.dim { color: var(--text-dim); }

  /* ── Progress ── */
  .progress-wrap {
    padding: 12px 20px 0;
  }
  .progress-bar {
    height: 4px;
    background: var(--border-subtle);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .progress-fill.show-1 { background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); }
  .progress-fill.show-2 { background: linear-gradient(90deg, var(--accent-3), var(--green)); }
  .progress-fill.show-3 { background: linear-gradient(90deg, var(--amber), var(--red)); }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-subtle);
  }

  /* ── Episode List ── */
  .ep-list { padding: 8px 20px 16px; }
  .ep-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 8px;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 0.15s, opacity 0.3s;
    border-radius: 4px;
  }
  .ep-item:last-child { border-bottom: none; }
  .ep-item:hover { background: rgba(255,255,255,0.02); }
  .ep-item.past {
    opacity: 0.45;
  }
  .ep-item.past:hover {
    opacity: 0.65;
    background: rgba(255,255,255,0.01);
  }
  .ep-item.past .ep-name {
    color: var(--text-dim);
  }
  .ep-item.past .ep-date {
    color: var(--text-dim);
    opacity: 0.6;
  }
  .ep-item.past .ep-number {
    color: var(--text-dim);
    opacity: 0.4;
  }
  .ep-item.next-up {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    margin: -1px 0 4px;
    padding: 10px 8px;
    border-radius: 8px;
    position: relative;
  }
  .ep-item.next-up::before {
    content: 'NEXT';
    position: absolute;
    top: -8px;
    left: 12px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 0 6px;
    border-radius: 3px;
    background: var(--bg-card);
    color: var(--accent-1);
  }

  .ep-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }
  .ep-dot.past { background: var(--text-dim); opacity: 0.5; }
  .ep-dot.past::after {
    content: '✓';
    position: absolute;
    inset: -4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 800;
    color: var(--text-dim);
  }
  .ep-dot.today {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }
  .ep-dot.upcoming { background: var(--border); border: 2px solid var(--text-dim); }
  .ep-dot.tomorrow {
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber);
  }
  .ep-dot.tomorrow::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid var(--amber);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  .ep-dot.today::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid var(--green);
    animation: ring-pulse 1.5s ease-in-out infinite;
  }
  @keyframes ring-pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 0.2; transform: scale(1.4); }
  }

  .ep-number {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    min-width: 44px;
    font-variant-numeric: tabular-nums;
  }
  .ep-details { flex: 1; min-width: 0; }
  .ep-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ep-name.today-ep { color: var(--green); }
  .ep-name.tomorrow-ep { color: var(--amber); }
  .ep-name .finale-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--amber);
    color: #000;
    margin-left: 6px;
    vertical-align: middle;
  }
  .ep-date {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 1px;
  }
  .ep-date strong { color: var(--text-muted); font-weight: 500; }
  .ep-time-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--border-subtle);
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ep-time-badge.today-badge { background: #22c55e22; color: var(--green); font-weight: 600; }
  .ep-time-badge.tomorrow-badge { background: #f59e0b22; color: var(--amber); font-weight: 600; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state .msg { font-size: 15px; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--text-dim);
    border-top: 1px solid var(--border-subtle);
    max-width: 1200px;
    margin: 0 auto;
  }
  .footer a { color: var(--accent-1); text-decoration: none; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .header { padding: 20px 16px 16px; }
    .header-title { font-size: 22px; }
    .header-top { flex-direction: column; }
    .header-time { text-align: left; }
    .main { padding: 16px; }
    .show-grid { grid-template-columns: 1fr; }
    .spotlight-card { flex-direction: column; align-items: flex-start; }
    .ep-item { flex-wrap: wrap; }
    .countdown-row { flex-wrap: wrap; }
    .countdown-row .timer { margin-left: 0; }
    .season-row { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- ═══ Header ═══ -->
<header class="header">
  <div class="header-content">
    <div class="header-top">
      <div>
        <h1 class="header-title">TV Shows Tracker</h1>
        <p class="header-subtitle">Episode release dashboard — times in your local timezone</p>
      </div>
      <div class="header-time">
        <div class="time" id="local-time">--:--</div>
        <div class="tz" id="local-tz">Loading...</div>
        <div class="date" id="local-date">---</div>
      </div>
    </div>
  </div>
</header>

<!-- ═══ Season summary chips ═══ -->
<div class="season-row" id="season-row"></div>

<!-- ═══ Filter Bar ═══ -->
<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All Shows</button>
  <button class="filter-btn" data-filter="today">Today</button>
  <button class="filter-btn" data-filter="upcoming">Upcoming</button>
</div>

<!-- ═══ Main ═══ -->
<main class="main" id="app">
  <div class="spotlight" id="spotlight"></div>
  <div class="show-grid" id="show-grid"></div>
</main>

<footer class="footer">
  <p>Data sourced from Wikipedia &amp; TVMaze • Updated <span id="update-date">---</span></p>
</footer>

<script>
// ── Data ──────────────────────────────────────────────────────────
// Show times are stored in their original US timezones.
// The browser auto-converts everything to YOUR local timezone.

const TZ_OFFSETS = {
  'America/New_York': -4,
  'America/Los_Angeles': -7,
};

const SHOWS = [
  {

      { ep: 'S09E08', title: 'Rickuiem Mort a Dream',            date: '2026-07-12' },
      { ep: 'S09E09', title: 'Salute Your Morts',                date: '2026-07-19' },
      { ep: 'S09E10', title: 'Field of Dreams',                  date: '2026-07-26' },
    ]
  },
  {

    name: 'X-Men \'97',
    season: 'Season 2',
    platform: 'Disney+',
    gradient: 'show-2',
    status: 'running',
    timezone: 'America/Los_Angeles',
    releaseHour: 0,
    releaseMinute: 0,
    schedule: [
      { ep: 'S02E01', title: 'Days of Past Future - Part 1',             date: '2026-07-01' },
      { ep: 'S02E02', title: 'A Force to be Reckoned With',              date: '2026-07-01' },
      { ep: 'S02E03', title: 'Rise of Apocalypse: Part 1',               date: '2026-07-01' },
      { ep: 'S02E04', title: 'Rise of Apocalypse: Part 2',               date: '2026-07-08' },
      { ep: 'S02E05', title: 'Weapon X, Lies, and DVDs',                  date: '2026-07-15' },
      { ep: 'S02E06', title: 'Danger.exe',                               date: '2026-07-22' },
      { ep: 'S02E07', title: 'Strange Land, Savage Heart',               date: '2026-07-29' },
      { ep: 'S02E08', title: "The Dead Man's Hand",                      date: '2026-08-05' },
      { ep: 'S02E09', title: 'Survival of the Fittest',                  date: '2026-08-12' },
    ]
  },
  {
    id: 'silo',
    name: 'Silo',
    season: 'Season 3',
    platform: 'Apple TV+',
    gradient: 'show-3',
    status: 'running',
    timezone: 'America/Los_Angeles',
    releaseHour: 0,
    releaseMinute: 0,
    schedule: [
      { ep: 'S03E01', title: 'Who Are You?',                           date: '2026-07-03' },
      { ep: 'S03E02', title: "It's All Good",                          date: '2026-07-10' },
      { ep: 'S03E03', title: 'A Dark Web',                              date: '2026-07-17' },
      { ep: 'S03E04', title: "Whatever You Do, Don't Go Home",         date: '2026-07-24' },
      { ep: 'S03E05', title: 'Memory',                                  date: '2026-07-31' },
      { ep: 'S03E06', title: 'The Drive',                               date: '2026-08-07' },
      { ep: 'S03E07', title: 'Radio',                                   date: '2026-08-14' },
      { ep: 'S03E08', title: 'Gray Goo',                                date: '2026-08-21' },
      { ep: 'S03E09', title: 'Farewell',                                 date: '2026-08-28' },
      { ep: 'S03E10', title: 'Troy',                                    date: '2026-09-04' },
    ]
  }
];

// ── Helpers ───────────────────────────────────────────────────────

function episodeTimestamp(dateStr, timezone, hour, minute) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const offset = TZ_OFFSETS[timezone] || 0;
  return Date.UTC(y, m - 1, d, hour - offset, minute);
}

function todayStr() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function tomorrowStr() {
  const now = new Date();
  now.setDate(now.getDate() + 1);
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function getLocalDate(dateStr, timezone, hour, minute) {
  const ts = episodeTimestamp(dateStr, timezone, hour, minute);
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function classifyDate(dateStr, timezone, hour, minute) {
  const epLocal = getLocalDate(dateStr, timezone, hour, minute);
  const t = todayStr();
  if (epLocal === t) return 'today';
  if (epLocal === tomorrowStr()) return 'tomorrow';
  if (epLocal < t) return 'past';
  return 'upcoming';
}

function formatLocalTime(dateStr, timezone, hour, minute) {
  const ts = episodeTimestamp(dateStr, timezone, hour, minute);
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', {
    weekday: 'short', hour: 'numeric', minute: '2-digit', hour12: true,
  });
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function formatTimezone() {
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Local';
  const offset = -new Date().getTimezoneOffset();
  const hrs = Math.floor(Math.abs(offset) / 60);
  const mins = Math.abs(offset) % 60;
  const sign = offset >= 0 ? '+' : '-';
  return `${tz} (GMT${sign}${hrs}:${String(mins).padStart(2, '0')})`;
}

/** Get the next upcoming episode for a show (or null if all past) */
function getNextEpisode(show) {
  for (const ep of show.schedule) {
    const cls = classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute);
    if (cls !== 'past') return ep;
  }
  return null;
}

/** Get the countdown in ms, days, hours, minutes, seconds */
function getCountdown(episodeTimestampMs) {
  const diff = episodeTimestampMs - Date.now();
  if (diff <= 0) return { total: 0, d: 0, h: 0, m: 0, s: 0 };
  const total = diff;
  const s = Math.floor((total / 1000) % 60);
  const m = Math.floor((total / 60000) % 60);
  const h = Math.floor((total / 3600000) % 24);
  const d = Math.floor(total / 86400000);
  return { total, d, h, m, s };
}

function formatCountdown(cd) {
  if (cd.total <= 0) return 'Airing now!';
  if (cd.d > 0) return `${cd.d}d ${cd.h}h`;
  if (cd.h > 0) return `${cd.h}h ${cd.m}m`;
  return `${cd.m}m ${cd.s}s`;
}

function formatCountdownFull(cd) {
  if (cd.total <= 0) return 'Airing now!';
  if (cd.d > 0) return `${cd.d}d ${cd.h}h ${cd.m}m`;
  if (cd.h > 0) return `${cd.h}h ${cd.m}m ${cd.s}s`;
  return `${cd.m}m ${cd.s}s`;
}

// ── Render Functions ──

function renderSeasonChips() {
  const row = document.getElementById('season-row');
  let html = '';
  for (const show of SHOWS) {
    const next = getNextEpisode(show);
    if (!next) {
      html += `<div class="season-chip"><span class="num">${show.name}</span> <span class="label">— Season Complete</span></div>`;
      continue;
    }
    const ts = episodeTimestamp(next.date, show.timezone, show.releaseHour, show.releaseMinute);
    const cd = getCountdown(ts);
    html += `<div class="season-chip"><span class="num">${show.name}</span> <span class="label">· Next ${next.ep} in</span> <span class="num" id="chip-${show.id}">${formatCountdown(cd)}</span></div>`;
  }
  row.innerHTML = html;
}

function renderSpotlight(todayEps, tomorrowEps) {
  const el = document.getElementById('spotlight');

  if (todayEps.length > 0) {
    const ep = todayEps[0];
    const ts = episodeTimestamp(ep.date, ep.timezone, ep.hour, ep.minute);
    const cd = getCountdown(ts);
    el.classList.add('has-spotlight');
    el.innerHTML = `
      <div class="spotlight-title" style="color:var(--green);"><span class="dot" style="background:var(--green);box-shadow:0 0 8px var(--green);"></span> Airing Today</div>
      <div class="spotlight-card" style="background:linear-gradient(135deg,#22c55e0d,#22c55e05);border-color:#22c55e33;">
        <span class="show-badge" style="background:var(--green);">${ep.showName}</span>
        <div class="ep-info">
          <div class="ep-title">${ep.ep} — ${ep.title}</div>
          <div class="ep-meta">${ep.platform} · ${formatDate(ep.date)}</div>
        </div>
        <div class="ep-right">
          <div class="ep-time" style="color:var(--green);">${formatLocalTime(ep.date, ep.timezone, ep.hour, ep.minute)}</div>
          <div class="countdown" style="color:var(--green);opacity:0.7;" id="spl-cd">${formatCountdown(cd)}</div>
        </div>
      </div>
    `;
    return;
  }

  if (tomorrowEps.length > 0) {
    const ep = tomorrowEps[0];
    const ts = episodeTimestamp(ep.date, ep.timezone, ep.hour, ep.minute);
    const cd = getCountdown(ts);
    el.classList.add('has-spotlight');
    el.innerHTML = `
      <div class="spotlight-title" style="color:var(--amber);"><span class="dot" style="background:var(--amber);box-shadow:0 0 8px var(--amber);"></span> Next Up — Tomorrow</div>
      <div class="spotlight-card" style="background:linear-gradient(135deg,#f59e0b0d,#f59e0b05);border-color:#f59e0b33;">
        <span class="show-badge" style="background:var(--amber);color:#000;">${ep.showName}</span>
        <div class="ep-info">
          <div class="ep-title">${ep.ep} — ${ep.title}</div>
          <div class="ep-meta">${ep.platform} · ${formatDate(ep.date)}</div>
        </div>
        <div class="ep-right">
          <div class="ep-time" style="color:var(--amber);">${formatLocalTime(ep.date, ep.timezone, ep.hour, ep.minute)}</div>
          <div class="countdown" style="color:var(--amber);opacity:0.7;" id="spl-cd">${formatCountdown(cd)}</div>
        </div>
      </div>
    `;
    return;
  }

  el.classList.remove('has-spotlight');
  el.innerHTML = '';
}

function renderShowCard(show) {
  const total = show.schedule.length;
  const pastCount = show.schedule.filter(e => classifyDate(e.date, show.timezone, show.releaseHour, show.releaseMinute) === 'past').length;
  const pct = Math.round((pastCount / total) * 100);
  const next = getNextEpisode(show);
  const allPast = !next;
  const isFinale = next && next.ep === show.schedule[show.schedule.length - 1].ep;

  // Countdown
  let cdHtml = '';
  if (next) {
    const ts = episodeTimestamp(next.date, show.timezone, show.releaseHour, show.releaseMinute);
    const cd = getCountdown(ts);
    const finaleTag = isFinale ? '<span class="finale-badge">🏁 FINALE</span>' : '';
    const timerCls = cd.d === 0 && cd.h < 6 ? 'amber' : 'green';
    cdHtml = `
      <div class="countdown-row">
        <span class="next-label">Next:</span>
        <span class="next-ep">${next.ep} — ${next.title}${finaleTag}</span>
        <span class="timer ${timerCls}" id="cd-${show.id}">${formatCountdownFull(cd)}</span>
      </div>`;
  }

  const statusLabel = allPast ? 'Season Done' : 'Airing';
  const statusCls = allPast ? 'done' : 'running';

  let itemsHtml = '';
  let hasPinnedNext = false;

  show.schedule.forEach((ep, idx) => {
    const cls = classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute);
    const localTime = formatLocalTime(ep.date, show.timezone, show.releaseHour, show.releaseMinute);
    const dateDisplay = formatDate(ep.date);

    // Pin the next-up episode at the top of the list
    if (cls !== 'past' && !hasPinnedNext && next && ep.ep === next.ep) {
      hasPinnedNext = true;
      const epNameCls = cls === 'today' ? 'today-ep' : cls === 'tomorrow' ? 'tomorrow-ep' : '';
      let badge;
      if (cls === 'today') badge = '<span class="ep-time-badge today-badge">TODAY</span>';
      else if (cls === 'tomorrow') badge = '<span class="ep-time-badge tomorrow-badge">TOMORROW</span>';
      else badge = `<span class="ep-time-badge">${localTime}</span>`;
      const finaleTag = isFinale ? '<span class="finale-tag">🏁 Finale</span>' : '';
      itemsHtml += `
        <div class="ep-item next-up ${cls === 'past' ? 'past' : ''}">
          <span class="ep-dot ${cls}"></span>
          <span class="ep-number">${ep.ep}</span>
          <div class="ep-details">
            <div class="ep-name ${epNameCls}">${ep.title}${finaleTag}</div>
            <div class="ep-date">${dateDisplay} · ${localTime}</div>
          </div>
          ${badge}
        </div>`;
      return;
    }

    // Regular episode rows
    const epNameCls = cls === 'today' ? 'today-ep' : cls === 'tomorrow' ? 'tomorrow-ep' : '';
    let badge;
    if (cls === 'today') badge = '<span class="ep-time-badge today-badge">TODAY</span>';
    else if (cls === 'tomorrow') badge = '<span class="ep-time-badge tomorrow-badge">TOMORROW</span>';
    else if (cls === 'past') badge = '<span class="ep-time-badge">Aired</span>';
    else badge = `<span class="ep-time-badge">${localTime}</span>`;
    const finaleTag = (idx === show.schedule.length - 1 && cls === 'upcoming') ? '<span class="finale-tag">🏁 Finale</span>' : '';

    itemsHtml += `
      <div class="ep-item ${cls === 'past' ? 'past' : ''}">
        <span class="ep-dot ${cls}"></span>
        <span class="ep-number">${ep.ep}</span>
        <div class="ep-details">
          <div class="ep-name ${epNameCls}">${ep.title}${finaleTag}</div>
          <div class="ep-date">${dateDisplay} · ${localTime}</div>
        </div>
        ${badge}
      </div>`;
  });

  return `
    <div class="show-card ${allPast ? 'season-done' : ''}" data-show="${show.id}">
      <div class="show-card-header" style="background: var(--gradient-${show.gradient});">
        <div class="show-info">
          <div class="show-name">${show.name}</div>
          <div class="show-meta">${show.season} · ${show.platform} · ${total} episodes</div>
        </div>
        <span class="show-status ${statusCls}">${statusLabel}</span>
      </div>
      ${cdHtml}
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill ${show.gradient}" style="width: ${pct}%"></div>
        </div>
        <div class="progress-label">
          <span>${pastCount} aired</span>
          <span>${total - pastCount} remaining</span>
        </div>
      </div>
      <div class="ep-list">${itemsHtml}</div>
    </div>
  `;
}

function renderAll(filter) {
  const todayEps = [];
  const tomorrowEps = [];
  const grid = document.getElementById('show-grid');

  let html = '';
  SHOWS.forEach(show => {
    const showHasToday = show.schedule.some(ep => classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute) === 'today');
    const showHasUpcoming = show.schedule.some(ep => ['today','tomorrow','upcoming'].includes(classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute)));

    show.schedule.forEach(ep => {
      const cls = classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute);
      const data = { ...ep, showName: show.name, platform: show.platform, timezone: show.timezone, hour: show.releaseHour, minute: show.releaseMinute };
      if (cls === 'today') todayEps.push(data);
      else if (cls === 'tomorrow') tomorrowEps.push(data);
    });

    if (filter === 'today' && !showHasToday) return;
    if (filter === 'upcoming' && !showHasUpcoming) return;

    html += renderShowCard(show);
  });

  renderSeasonChips();
  renderSpotlight(todayEps, tomorrowEps);
  grid.innerHTML = html || `<div class="empty-state"><div class="icon">📭</div><div class="msg">No episodes match this filter.</div></div>`;

  // Start ticking countdowns
  tickCountdowns();
}

// ── Live countdown ticks ──

let tickInterval = null;

function tickCountdowns() {
  if (tickInterval) clearInterval(tickInterval);

  function tick() {
    // Update spotlight countdown
    const splCd = document.getElementById('spl-cd');
    if (splCd) {
      const spotEl = document.getElementById('spotlight');
      if (spotEl && spotEl.classList.contains('has-spotlight')) {
        const card = spotEl.querySelector('.spotlight-card');
        // Recalculate from the first today/tomorrow episode
        const todayEps = [];
        const tomorrowEps = [];
        SHOWS.forEach(show => {
          show.schedule.forEach(ep => {
            const cls = classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute);
            const data = { ...ep, timezone: show.timezone, hour: show.releaseHour, minute: show.releaseMinute };
            if (cls === 'today') todayEps.push(data);
            else if (cls === 'tomorrow') tomorrowEps.push(data);
          });
        });
        const ep = todayEps.length > 0 ? todayEps[0] : tomorrowEps.length > 0 ? tomorrowEps[0] : null;
        if (ep) {
          const ts = episodeTimestamp(ep.date, ep.timezone, ep.hour, ep.minute);
          const cd = getCountdown(ts);
          splCd.textContent = formatCountdown(cd);
        }
      }
    }

    // Update each show's countdown
    SHOWS.forEach(show => {
      const el = document.getElementById(`cd-${show.id}`);
      if (!el) return;
      const next = getNextEpisode(show);
      if (!next) { el.textContent = 'Season done'; return; }
      const ts = episodeTimestamp(next.date, show.timezone, show.releaseHour, show.releaseMinute);
      const cd = getCountdown(ts);
      el.textContent = formatCountdownFull(cd);
      // Color
      el.className = `timer ${cd.d === 0 && cd.h < 6 ? 'amber' : 'green'}`;
    });

    // Update chips
    SHOWS.forEach(show => {
      const chip = document.getElementById(`chip-${show.id}`);
      if (!chip) return;
      const next = getNextEpisode(show);
      if (!next) return;
      const ts = episodeTimestamp(next.date, show.timezone, show.releaseHour, show.releaseMinute);
      const cd = getCountdown(ts);
      chip.textContent = formatCountdown(cd);
    });
  }

  tick();
  tickInterval = setInterval(tick, 1000);
}

// ── Clock ──

function updateClock() {
  const now = new Date();
  document.getElementById('local-time').textContent =
    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
  document.getElementById('local-date').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

// ── Init ──

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('update-date').textContent = new Date().toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric'
  });
  document.getElementById('local-tz').textContent = formatTimezone();

  let filter = 'all';
  renderAll(filter);

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      if (tickInterval) clearInterval(tickInterval);
      renderAll(filter);
    });
  });

  // Clock
  updateClock();
  setInterval(updateClock, 1000);
});
</script>
