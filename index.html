<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Shows Tracker — Episode Release Dashboard</title>

<!-- Type: Figtree (display), DM Sans (body), JetBrains Mono (data) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=Figtree:ital,wght@0,300..900;1,300..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:            #08080c;
    --bg-card:       #12121a;
    --bg-card-hover: #181824;
    --border:        #1e1e30;
    --border-subtle: #151522;
    --text:          #ece8e0;
    --text-muted:    #8a8694;
    --text-dim:      #55506a;
    --red:           #e84a4a;    /* live / now airing — broadcast red */
    --amber:         #e89a3a;    /* tomorrow / countdown <6h */
    --blue:          #3a7bd5;    /* streaming / accent */
    --gradient-header: linear-gradient(135deg, #140808 0%, #0a0a18 50%, #08080c 100%);
    --gradient-1:    linear-gradient(135deg, #e84a4a11, #3a7bd511);
    --gradient-2:    linear-gradient(135deg, #3a7bd511, #e89a3a11);
    --gradient-3:    linear-gradient(135deg, #e89a3a11, #e84a4a11);
    --radius:        12px;
    --radius-sm:     8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
    overflow-x: hidden;
  }
  /* Subtle scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ── Typography scale ── */
  .hdg-xl { font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 28px; letter-spacing: -0.03em; line-height: 1.2; }
  .hdg-lg { font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.02em; line-height: 1.25; }
  .hdg-md { font-family: 'Figtree', sans-serif; font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }
  .hdg-sm { font-family: 'Figtree', sans-serif; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; }
  .body-md { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 400; }
  .body-sm { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400; color: var(--text-muted); }
  .data-lg { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; letter-spacing: -0.04em; }
  .data-md { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: -0.02em; }
  .data-sm { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; color: var(--text-dim); }

  /* ── Header ── */
  .header {
    background: var(--gradient-header);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 20px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 700px 250px at 50% -120px, #e84a4a22, transparent 70%);
    pointer-events: none;
  }
  .header-content {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
  }

  /* Signal bars — signature broadcast element */
  .signal-bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    margin-top: 10px;
  }
  .signal-bar {
    width: 3px;
    border-radius: 2px;
    background: currentColor;
    transition: height 0.4s ease;
  }
  .signal-bar:nth-child(1) { height: 12px; color: var(--red); }
  .signal-bar:nth-child(2) { height: 20px; color: var(--amber); }
  .signal-bar:nth-child(3) { height: 28px; color: var(--blue); }

  .header-title { color: var(--text); }
  .header-title .accent-red { color: var(--red); }
  .header-title .accent-amber { color: var(--amber); }
  .header-title .accent-blue { color: var(--blue); }
  .header-subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .header-time { text-align: right; }
  .header-time .time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.03em;
  }
  .header-time .tz {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .header-time .date {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── Season chips ── */
  .season-row {
    max-width: 1200px;
    margin: 18px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .season-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    position: relative;
    overflow: hidden;
  }
  .season-chip .num { font-weight: 700; color: var(--text); }
  .season-chip .chip-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Filter bar ── */
  .filter-bar {
    max-width: 1200px;
    margin: 18px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .filter-btn:hover { border-color: var(--blue); color: var(--text); }
  .filter-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

  /* ── Main ── */
  .main {
    max-width: 1200px;
    margin: 24px auto;
    padding: 0 24px 48px;
  }

  /* ── Spotlight ── */
  .spotlight { margin-bottom: 32px; display: none; }
  .spotlight.has-spotlight { display: block; }
  .spotlight-title {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .spotlight-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }
  .spotlight-card {
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
  }
  /* Ambient sweep on spotlight (signature animation) */
  .spotlight-card::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(232,74,74,0.04), transparent);
    animation: sweep 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes sweep {
    0%, 100% { left: -100%; }
    50% { left: 150%; }
  }
  .spotlight-card .show-badge {
    font-family: 'Figtree', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 6px;
    color: #000;
    position: relative;
    z-index: 1;
  }
  .spotlight-card .ep-info { flex: 1; min-width: 200px; position: relative; z-index: 1; }
  .spotlight-card .ep-title { font-family: 'Figtree', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .spotlight-card .ep-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .spotlight-card .ep-right { text-align: right; flex-shrink: 0; position: relative; z-index: 1; }
  .spotlight-card .ep-time { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; white-space: nowrap; }
  .spotlight-card .countdown { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; margin-top: 4px; opacity: 0.8; font-variant-numeric: tabular-nums; }

  /* ── Show Grid ── */
  .show-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 20px;
  }

  /* ── Show Card ── */
  .show-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  }
  .show-card:hover {
    border-color: #2a2a40;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .show-card.season-done { opacity: 0.5; }

  .show-card-header {
    padding: 20px 20px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .show-card-header .show-name {
    font-family: 'Figtree', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .show-card-header .show-meta {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .show-status {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 12px;
    border-radius: 20px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .show-status.running { background: #3a7bd522; color: var(--blue); border: 1px solid #3a7bd533; }
  .show-status.done { background: #55506a22; color: var(--text-dim); border: 1px solid #55506a33; }

  /* ── Countdown row with progress ring ── */
  .countdown-row {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .cd-ring-wrap {
    flex-shrink: 0;
    position: relative;
    width: 44px;
    height: 44px;
  }
  .cd-ring-wrap svg {
    width: 44px;
    height: 44px;
    transform: rotate(-90deg);
  }
  .cd-ring-wrap .ring-bg {
    fill: none;
    stroke: var(--border-subtle);
    stroke-width: 3;
  }
  .cd-ring-wrap .ring-fg {
    fill: none;
    stroke: var(--blue);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease;
  }
  .cd-ring-wrap .ring-fg.live { stroke: var(--red); }
  .cd-ring-wrap .ring-fg.close { stroke: var(--amber); }
  .cd-ring-wrap .cd-center {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cd-ring-wrap .cd-center .bar {
    width: 3px;
    height: 14px;
    border-radius: 2px;
    background: var(--red);
    opacity: 0.5;
  }
  .cd-ring-wrap .cd-center .bar:nth-child(1) { animation: bar-pulse 1.8s ease-in-out infinite; }
  .cd-ring-wrap .cd-center .bar:nth-child(2) { animation: bar-pulse 1.8s ease-in-out 0.3s infinite; }
  .cd-ring-wrap .cd-center .bar:nth-child(3) { animation: bar-pulse 1.8s ease-in-out 0.6s infinite; }
  @keyframes bar-pulse {
    0%, 100% { opacity: 0.3; height: 10px; }
    50% { opacity: 1; height: 18px; }
  }

  .cd-details { flex: 1; min-width: 0; }
  .cd-details .cd-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .cd-details .cd-ep {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cd-details .cd-ep .finale-badge {
    font-family: 'Figtree', sans-serif;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--amber);
    color: #000;
    margin-left: 6px;
  }
  .cd-countdown {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .cd-countdown.live { color: var(--red); }
  .cd-countdown.close { color: var(--amber); }
  .cd-countdown.far { color: var(--blue); }

  /* ── Progress bar ── */
  .progress-wrap { padding: 12px 20px 0; }
  .progress-bar {
    height: 3px;
    background: var(--border-subtle);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .progress-fill.show-1 { background: linear-gradient(90deg, var(--red), var(--blue)); }
  .progress-fill.show-2 { background: linear-gradient(90deg, var(--blue), var(--amber)); }
  .progress-fill.show-3 { background: linear-gradient(90deg, var(--amber), var(--red)); }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-subtle);
  }

  /* ── Episode List ── */
  .ep-list { padding: 8px 20px 16px; }
  .ep-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 8px;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 0.15s, opacity 0.3s;
    border-radius: 4px;
  }
  .ep-item:last-child { border-bottom: none; }
  .ep-item:hover { background: rgba(255,255,255,0.02); }
  .ep-item.past { opacity: 0.4; }
  .ep-item.past:hover { opacity: 0.6; }
  .ep-item.next-up {
    background: rgba(58,123,213,0.03);
    border: 1px solid #3a7bd522;
    margin: -1px 0 4px;
    padding: 9px 8px;
    border-radius: 8px;
    position: relative;
  }
  .ep-item.next-up::before {
    content: 'NEXT';
    font-family: 'JetBrains Mono', monospace;
    position: absolute;
    top: -8px;
    left: 12px;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 0 6px;
    border-radius: 3px;
    background: var(--bg-card);
    color: var(--blue);
  }

  .ep-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }
  .ep-dot.past { background: var(--text-dim); opacity: 0.5; }
  .ep-dot.past::after {
    content: '✓';
    position: absolute;
    inset: -4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 800;
    color: var(--text-dim);
  }
  .ep-dot.today { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .ep-dot.today::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid var(--red);
    animation: ring-pulse 1.5s ease-in-out infinite;
  }
  .ep-dot.tomorrow { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .ep-dot.tomorrow::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid var(--amber);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  .ep-dot.upcoming { background: var(--border); border: 2px solid var(--text-dim); }
  @keyframes ring-pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 0.2; transform: scale(1.4); }
  }

  .ep-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    min-width: 44px;
    font-variant-numeric: tabular-nums;
  }
  .ep-details { flex: 1; min-width: 0; }
  .ep-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ep-name.today-ep { color: var(--red); font-weight: 600; }
  .ep-name.tomorrow-ep { color: var(--amber); }
  .ep-name .finale-tag {
    font-family: 'Figtree', sans-serif;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--amber);
    color: #000;
    margin-left: 6px;
    vertical-align: middle;
  }
  .ep-date {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 1px;
  }
  .ep-date strong { color: var(--text-muted); font-weight: 500; }
  .ep-time-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 5px;
    background: var(--border-subtle);
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ep-time-badge.today-badge { background: #e84a4a22; color: var(--red); font-weight: 700; }
  .ep-time-badge.tomorrow-badge { background: #e89a3a22; color: var(--amber); font-weight: 700; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state .msg { font-family: 'DM Sans', sans-serif; font-size: 15px; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-dim);
    border-top: 1px solid var(--border-subtle);
    max-width: 1200px;
    margin: 0 auto;
  }
  .footer a { color: var(--blue); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .header { padding: 20px 16px 14px; }
    .hdg-xl { font-size: 22px; }
    .header-top { flex-direction: column; }
    .header-time { text-align: left; }
    .main { padding: 16px; }
    .show-grid { grid-template-columns: 1fr; }
    .spotlight-card { flex-direction: column; align-items: flex-start; }
    .ep-item { flex-wrap: wrap; }
    .countdown-row { flex-wrap: wrap; }
    .cd-ring-wrap { width: 36px; height: 36px; }
    .cd-ring-wrap svg { width: 36px; height: 36px; }
    .cd-countdown { font-size: 14px; }
    .season-row { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- ═══ Header with signal bars ═══ -->
<header class="header">
  <div class="header-content">
    <div class="header-top">
      <div>
        <h1 class="header-title hdg-xl">
          <span class="accent-red">TV</span> Shows
          <span class="accent-amber">Track</span><span class="accent-blue">er</span>
        </h1>
        <p class="header-subtitle">Episode release dashboard — all times in your local timezone</p>
        <div class="signal-bars">
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
        </div>
      </div>
      <div class="header-time">
        <div class="time" id="local-time">--:--:--</div>
        <div class="tz" id="local-tz">Loading...</div>
        <div class="date" id="local-date">---</div>
      </div>
    </div>
  </div>
</header>

<!-- ═══ Season summary chips ═══ -->
<div class="season-row" id="season-row"></div>

<!-- ═══ Filter Bar ═══ -->
<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All Shows</button>
  <button class="filter-btn" data-filter="today">Today</button>
  <button class="filter-btn" data-filter="upcoming">Upcoming</button>
</div>

<!-- ═══ Main ═══ -->
<main class="main" id="app">
  <div class="spotlight" id="spotlight"></div>
  <div class="show-grid" id="show-grid"></div>
</main>

<footer class="footer">
  <a href="https://github.com/hermey-bot/tv-shows-tracker" target="_blank" rel="noopener">GitHub</a>
  · Data from Wikipedia &amp; TVMaze
  · Updated <span id="update-date">---</span>
</footer>

<script>
// ── Data ──────────────────────────────────────────────────────────

const C = 2 * Math.PI * 14; // SVG ring circumference (r=14)

const TZ_OFFSETS = {
  'America/New_York': -4,
  'America/Los_Angeles': -7,

// ── Helpers ───────────────────────────────────────────────────────

function episodeTimestamp(dateStr, timezone, hour, minute) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const offset = TZ_OFFSETS[timezone] || 0;
  return Date.UTC(y, m - 1, d, hour - offset, minute);
}

function todayStr() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function tomorrowStr() {
  const now = new Date();
  now.setDate(now.getDate() + 1);
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function getLocalDate(dateStr, timezone, hour, minute) {
  const ts = episodeTimestamp(dateStr, timezone, hour, minute);
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function classifyDate(dateStr, timezone, hour, minute) {
  const epLocal = getLocalDate(dateStr, timezone, hour, minute);
  const t = todayStr();
  if (epLocal === t) return 'today';
  if (epLocal === tomorrowStr()) return 'tomorrow';
  if (epLocal < t) return 'past';
  return 'upcoming';
}

function formatLocalTime(dateStr, timezone, hour, minute) {
  const ts = episodeTimestamp(dateStr, timezone, hour, minute);
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', {
    weekday: 'short', hour: 'numeric', minute: '2-digit', hour12: true,
  });
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function formatTimezone() {
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Local';
  const offset = -new Date().getTimezoneOffset();
  const hrs = Math.floor(Math.abs(offset) / 60);
  const mins = Math.abs(offset) % 60;
  const sign = offset >= 0 ? '+' : '-';
  return `${tz} (GMT${sign}${hrs}:${String(mins).padStart(2, '0')})`;
}

function getNextEpisode(show) {
  for (const ep of show.schedule) {
    const cls = classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute);
    if (cls !== 'past') return ep;
  }
  return null;
}

function getPrevEpisode(show) {
  let prev = null;
  for (const ep of show.schedule) {
    const cls = classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute);
    if (cls === 'past') prev = ep;
    else break;
  }
  return prev;
}

function getCountdown(episodeTimestampMs) {
  const diff = episodeTimestampMs - Date.now();
  if (diff <= 0) return { total: 0, d: 0, h: 0, m: 0, s: 0 };
  const total = diff;
  const s = Math.floor((total / 1000) % 60);
  const m = Math.floor((total / 60000) % 60);
  const h = Math.floor((total / 3600000) % 24);
  const d = Math.floor(total / 86400000);
  return { total, d, h, m, s };
}

function formatCountdownFull(cd) {
  if (cd.total <= 0) return 'Now';
  if (cd.d > 0) return `${cd.d}d ${cd.h}h ${cd.m}m`;
  if (cd.h > 0) return `${cd.h}h ${cd.m}m ${cd.s}s`;
  return `${cd.m}m ${cd.s}s`;
}

function getRingProgress(show) {
  const next = getNextEpisode(show);
  const prev = getPrevEpisode(show);
  if (!next) return 1; // season done
  if (!prev) return 0; // no previous episode yet
  const nextTs = episodeTimestamp(next.date, show.timezone, show.releaseHour, show.releaseMinute);
  const prevTs = episodeTimestamp(prev.date, show.timezone, show.releaseHour, show.releaseMinute);
  const now = Date.now();
  const total = nextTs - prevTs;
  const elapsed = now - prevTs;
  if (total <= 0) return 1;
  return Math.min(1, Math.max(0, elapsed / total));
}

function renderSeasonChips() {
  const row = document.getElementById('season-row');
  let html = '';
  for (const show of SHOWS) {
    const next = getNextEpisode(show);
    let color = 'var(--text-dim)';
    let label;
    if (!next) {
      color = 'var(--text-dim)';
      label = 'Season Complete';
    } else {
      const cls = classifyDate(next.date, show.timezone, show.releaseHour, show.releaseMinute);
      if (cls === 'today') { color = 'var(--red)'; label = 'Airing Today'; }
      else if (cls === 'tomorrow') { color = 'var(--amber)'; label = 'Tomorrow'; }
      else { color = 'var(--blue)'; label = `Next ${next.ep}`; }
      const ts = episodeTimestamp(next.date, show.timezone, show.releaseHour, show.releaseMinute);
      const cd = getCountdown(ts);
      html += `<div class="season-chip"><span class="chip-dot" style="background:${color}"></span><span class="num">${show.name}</span> <span>${label} · </span><span class="num" id="chip-${show.id}">${cd.d > 0 ? cd.d+'d '+cd.h+'h' : cd.h > 0 ? cd.h+'h '+cd.m+'m' : cd.m+'m'}</span></div>`;
      continue;
    }
    html += `<div class="season-chip"><span class="chip-dot" style="background:${color}"></span><span class="num">${show.name}</span><span> — ${label}</span></div>`;
  }
  row.innerHTML = html;
}

    const cd = getCountdown(ts);
    el.classList.add('has-spotlight');
    el.innerHTML = `
      <div class="spotlight-title hdg-sm" style="color:var(--amber);"><span class="dot" style="background:var(--amber);box-shadow:0 0 8px var(--amber);"></span>Next Up — Tomorrow</div>
      <div class="spotlight-card" style="background:linear-gradient(135deg,#e89a3a0d,#e89a3a05);border:1px solid #e89a3a33;">
        <span class="show-badge" style="background:var(--amber);color:#000;">${ep.showName}</span>
        <div class="ep-info">
          <div class="ep-title">${ep.ep} — ${ep.title}</div>
          <div class="ep-meta">${ep.platform} · ${formatDate(ep.date)}</div>
        </div>
        <div class="ep-right">
          <div class="ep-time" style="color:var(--amber);">${formatLocalTime(ep.date, ep.timezone, ep.hour, ep.minute)}</div>
          <div class="countdown" style="color:var(--amber);" id="spl-cd">${formatCountdownFull(cd)}</div>

    return;
  }
  el.classList.remove('has-spotlight');
  el.innerHTML = '';
}

function renderRingProgress(show) {
  const pct = getRingProgress(show);
  const off = C * (1 - Math.min(1, Math.max(0, pct)));
  const next = getNextEpisode(show);
  let cls = 'ring-fg';
  if (!next) cls = 'ring-bg';
  else {
    const cls2 = classifyDate(next.date, show.timezone, show.releaseHour, show.releaseMinute);
    if (cls2 === 'today') cls += ' live';
    else if (pct > 0.7) cls += ' close';
  }
  return `<div class="cd-ring-wrap">
    <svg viewBox="0 0 36 36">
      <circle class="ring-bg" cx="18" cy="18" r="14"/>
      <circle class="${cls}" cx="18" cy="18" r="14" stroke-dasharray="${C}" stroke-dashoffset="${off}"/>
    </svg>
    <div class="cd-center">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>`;
}

function renderShowCard(show) {
  const total = show.schedule.length;
  const pastCount = show.schedule.filter(e => classifyDate(e.date, show.timezone, show.releaseHour, show.releaseMinute) === 'past').length;
  const pct = Math.round((pastCount / total) * 100);
  const next = getNextEpisode(show);
  const allPast = !next;
  const isFinale = next && next.ep === show.schedule[show.schedule.length - 1].ep;

  // Countdown row
  let cdHtml = '';
  if (next) {
    const ts = episodeTimestamp(next.date, show.timezone, show.releaseHour, show.releaseMinute);
    const cd = getCountdown(ts);
    const cls = classifyDate(next.date, show.timezone, show.releaseHour, show.releaseMinute);
    const cdCls = cls === 'today' ? 'live' : cd.d === 0 && cd.h < 6 ? 'close' : 'far';
    const finaleTag = isFinale ? '<span class="finale-badge">🏁 Finale</span>' : '';
    cdHtml = `
      <div class="countdown-row">
        ${renderRingProgress(show)}
        <div class="cd-details">
          <div class="cd-label">Next episode</div>
          <div class="cd-ep">${next.ep} — ${next.title}${finaleTag}</div>
        </div>
        <div class="cd-countdown ${cdCls}" id="cd-${show.id}">${formatCountdownFull(cd)}</div>
      </div>`;
  }

  const statusLabel = allPast ? 'Season Done' : 'Airing';
  const statusCls = allPast ? 'done' : 'running';

  let itemsHtml = '';
  let hasPinnedNext = false;

  show.schedule.forEach((ep, idx) => {
    const cls = classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute);
    const localTime = formatLocalTime(ep.date, show.timezone, show.releaseHour, show.releaseMinute);
    const dateDisplay = formatDate(ep.date);
    const isNext = next && ep.ep === next.ep;
    const isFinaleEp = idx === show.schedule.length - 1;

    if (cls !== 'past' && !hasPinnedNext && isNext) {
      hasPinnedNext = true;
      const epNameCls = cls === 'today' ? 'today-ep' : cls === 'tomorrow' ? 'tomorrow-ep' : '';
      let badge;
      if (cls === 'today') badge = '<span class="ep-time-badge today-badge">TODAY</span>';
      else if (cls === 'tomorrow') badge = '<span class="ep-time-badge tomorrow-badge">TOMORROW</span>';
      else badge = `<span class="ep-time-badge">${localTime}</span>`;
      const finaleTag = isFinaleEp ? '<span class="finale-tag">🏁 Finale</span>' : '';
      itemsHtml += `
        <div class="ep-item next-up">
          <span class="ep-dot ${cls}"></span>
          <span class="ep-number">${ep.ep}</span>
          <div class="ep-details">
            <div class="ep-name ${epNameCls}">${ep.title}${finaleTag}</div>
            <div class="ep-date">${dateDisplay} · ${localTime}</div>
          </div>
          ${badge}
        </div>`;
      return;
    }

    const epNameCls = cls === 'today' ? 'today-ep' : cls === 'tomorrow' ? 'tomorrow-ep' : '';
    let badge;
    if (cls === 'today') badge = '<span class="ep-time-badge today-badge">TODAY</span>';
    else if (cls === 'tomorrow') badge = '<span class="ep-time-badge tomorrow-badge">TOMORROW</span>';
    else if (cls === 'past') badge = '<span class="ep-time-badge">Aired</span>';
    else badge = `<span class="ep-time-badge">${localTime}</span>`;
    const finaleTag = isFinaleEp && cls !== 'past' ? '<span class="finale-tag">🏁 Finale</span>' : '';

    itemsHtml += `
      <div class="ep-item ${cls === 'past' ? 'past' : ''}">
        <span class="ep-dot ${cls}"></span>
        <span class="ep-number">${ep.ep}</span>
        <div class="ep-details">
          <div class="ep-name ${epNameCls}">${ep.title}${finaleTag}</div>
          <div class="ep-date">${dateDisplay} · ${localTime}</div>
        </div>
        ${badge}
      </div>`;
  });

  return `
    <div class="show-card ${allPast ? 'season-done' : ''}" data-show="${show.id}">
      <div class="show-card-header" style="background: var(--gradient-${show.gradient});">
        <div>
          <div class="show-name">${show.name}</div>
          <div class="show-meta">${show.season} · ${show.platform} · ${total} episodes</div>
        </div>
        <span class="show-status ${statusCls}">${statusLabel}</span>
      </div>
      ${cdHtml}
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill ${show.gradient}" style="width: ${pct}%"></div>
        </div>
        <div class="progress-label">
          <span>${pastCount} aired</span>
          <span>${total - pastCount} left</span>
        </div>
      </div>
      <div class="ep-list">${itemsHtml}</div>
    </div>
  `;
}

function renderAll(filter) {
  const todayEps = [];
  const tomorrowEps = [];
  const grid = document.getElementById('show-grid');

  let html = '';
  SHOWS.forEach(show => {
    const showHasToday = show.schedule.some(ep => classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute) === 'today');
    const showHasUpcoming = show.schedule.some(ep => ['today','tomorrow','upcoming'].includes(classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute)));

    show.schedule.forEach(ep => {
      const cls = classifyDate(ep.date, show.timezone, show.releaseHour, show.releaseMinute);
      const data = { ...ep, showName: show.name, platform: show.platform, timezone: show.timezone, hour: show.releaseHour, minute: show.releaseMinute };
      if (cls === 'today') todayEps.push(data);
      else if (cls === 'tomorrow') tomorrowEps.push(data);
    });

    if (filter === 'today' && !showHasToday) return;
    if (filter === 'upcoming' && !showHasUpcoming) return;

    html += renderShowCard(show);
  });

  renderSeasonChips();
  renderSpotlight(todayEps, tomorrowEps);
  grid.innerHTML = html || `<div class="empty-state"><div class="icon">📭</div><div class="msg body-md">No episodes match this filter.</div></div>`;

  tickCountdowns();
}

// ── Live countdown ticks ──

let tickInterval = null;

function tickCountdowns() {
  if (tickInterval) clearInterval(tickInterval);

  function tick() {
    // Spotlight
    const splCd = document.getElementById('spl-cd');
    if (splCd) {
      const spotEl = document.getElementById('spotlight');
      if (spotEl && spotEl.classList.contains('has-spotlight')) {
        const te = []; const tme = [];
        SHOWS.forEach(s => s.schedule.forEach(ep => {
          const c = classifyDate(ep.date, s.timezone, s.releaseHour, s.releaseMinute);
          const d = { ...ep, timezone: s.timezone, hour: s.releaseHour, minute: s.releaseMinute };
          if (c === 'today') te.push(d);
          else if (c === 'tomorrow') tme.push(d);
        }));
        const ep = te.length > 0 ? te[0] : tme.length > 0 ? tme[0] : null;
        if (ep) {
          const ts = episodeTimestamp(ep.date, ep.timezone, ep.hour, ep.minute);
          splCd.textContent = formatCountdownFull(getCountdown(ts));
        }
      }
    }

    // Show countdowns + rings
    SHOWS.forEach(show => {
      const next = getNextEpisode(show);
      const el = document.getElementById(`cd-${show.id}`);
      if (!el) return;
      if (!next) { el.textContent = '—'; return; }
      const ts = episodeTimestamp(next.date, show.timezone, show.releaseHour, show.releaseMinute);
      const cd = getCountdown(ts);
      el.textContent = formatCountdownFull(cd);

      // Update ring animation
      const ringWrap = el.closest('.countdown-row')?.querySelector('.cd-ring-wrap');
      if (ringWrap) {
        const pct = getRingProgress(show);
        const off = C * (1 - Math.min(1, Math.max(0, pct)));
        const circle = ringWrap.querySelector('.ring-fg');
        if (circle) {
          circle.setAttribute('stroke-dashoffset', off);
          // Update class
          const cls2 = classifyDate(next.date, show.timezone, show.releaseHour, show.releaseMinute);
          circle.className = 'ring-fg';
          if (cls2 === 'today') circle.classList.add('live');
          else if (pct > 0.7) circle.classList.add('close');
        }
      }
    });

    // Chips
    SHOWS.forEach(show => {
      const chip = document.getElementById(`chip-${show.id}`);
      if (!chip) return;
      const next = getNextEpisode(show);
      if (!next) return;
      const ts = episodeTimestamp(next.date, show.timezone, show.releaseHour, show.releaseMinute);
      const cd = getCountdown(ts);
      chip.textContent = cd.d > 0 ? cd.d+'d '+cd.h+'h' : cd.h > 0 ? cd.h+'h '+cd.m+'m' : cd.m+'m';
    });
  }

  tick();
  tickInterval = setInterval(tick, 1000);
}

// ── Clock ──

function updateClock() {
  const now = new Date();
  document.getElementById('local-time').textContent =
    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
  document.getElementById('local-date').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

// ── Signal bars animation ──

function tickSignalBars() {
  const bars = document.querySelectorAll('.signal-bar');
  bars.forEach((bar, i) => {
    const heights = [12 + Math.random() * 12, 18 + Math.random() * 16, 24 + Math.random() * 18];
    bar.style.height = heights[i] + 'px';
  });
}

// ── Init ──

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('update-date').textContent = new Date().toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric',
  });
  document.getElementById('local-tz').textContent = formatTimezone();

  let filter = 'all';
  renderAll(filter);

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      if (tickInterval) clearInterval(tickInterval);
      renderAll(filter);
    });
  });

  // Clock
  updateClock();
  setInterval(updateClock, 1000);

  // Signal bars ambient animation
  tickSignalBars();
  setInterval(tickSignalBars, 800);
});
